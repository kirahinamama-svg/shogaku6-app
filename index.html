<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="6年チャレンジ">
<meta name="theme-color" content="#38a169">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>小学6年 全教科チャレンジ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif; background: #f0fff4; min-height: 100vh; overflow-x: hidden; }

/* ===== アニメーション ===== */
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
@keyframes float { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
@keyframes walk { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(0.95)} }
@keyframes sparkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }

.bounce { animation: bounce 1s infinite; }
.float  { animation: float 2s ease-in-out infinite; }
.pop    { animation: pop 0.3s ease-out; }
.shake  { animation: shake 0.4s ease-out; }
.slideUp{ animation: slideUp 0.4s ease-out; }

/* ===== ホーム ===== */
#home { display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:24px 20px 40px; background: linear-gradient(180deg,#e8f5e9 0%,#f0fff4 60%); }
.home-mascot { width:150px; height:150px; object-fit:cover; object-position:45% 60%; border-radius:50%; margin-bottom:4px; animation: float 2.5s ease-in-out infinite; box-shadow:0 8px 24px rgba(0,0,0,0.18); border:4px solid #68d391; }
.animal-photo { width:100%; max-width:340px; height:160px; object-fit:cover; border-radius:16px; margin-bottom:10px; box-shadow:0 4px 16px rgba(0,0,0,0.12); display:block; margin-left:auto; margin-right:auto; }
.home-title { font-size:22px; font-weight:bold; color:#1b5e20; text-align:center; margin-bottom:4px; }
.home-sub { font-size:13px; color:#4caf50; margin-bottom:4px; text-align:center; }
.home-note { font-size:12px; color:#81c784; margin-bottom:24px; text-align:center; }

.grass { font-size:28px; letter-spacing:-4px; margin-bottom:16px; }

.subject-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; max-width:360px; }
.subject-btn { padding:18px 12px; border:none; border-radius:20px; font-size:15px; font-weight:bold; color:white; cursor:pointer; text-align:center; box-shadow:0 6px 16px rgba(0,0,0,0.15); transition:transform 0.15s,box-shadow 0.15s; position:relative; overflow:hidden; }
.subject-btn:active { transform:scale(0.94); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.subject-btn .s-emoji { font-size:32px; display:block; margin-bottom:6px; }
.subject-btn .s-name { font-size:17px; font-weight:bold; display:block; }
.subject-btn .s-count { font-size:11px; font-weight:normal; opacity:0.85; display:block; margin-top:2px; }
.subject-btn.kokugo { background:linear-gradient(135deg,#e53e3e,#fc8181); }
.subject-btn.sansu  { background:linear-gradient(135deg,#3182ce,#63b3ed); }
.subject-btn.rika   { background:linear-gradient(135deg,#38a169,#68d391); }
.subject-btn.shakai { background:linear-gradient(135deg,#d69e2e,#f6c90e); color:#5c3c00; }
.subject-btn.eigo   { background:linear-gradient(135deg,#805ad5,#b794f4); }
.all-btn { margin-top:14px; width:100%; max-width:360px; padding:20px; border:none; border-radius:20px; font-size:18px; font-weight:bold; color:white; background:linear-gradient(135deg,#2d3748,#4a5568); cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.2); transition:transform 0.15s; }
.all-btn:active { transform:scale(0.97); }
.install-hint { margin-top:20px; font-size:12px; color:#81c784; text-align:center; cursor:pointer; text-decoration:underline; }

/* ===== クイズ ===== */
#quiz { display:none; flex-direction:column; min-height:100vh; }
.quiz-header { padding:14px 16px 10px; background:white; box-shadow:0 2px 12px rgba(0,0,0,0.08); position:sticky; top:0; z-index:10; }
.quiz-header-top { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.back-btn { background:#f0fff4; border:2px solid #68d391; border-radius:10px; padding:6px 12px; font-size:13px; cursor:pointer; color:#276749; font-weight:bold; }
.subject-label { font-size:14px; font-weight:bold; color:#2d3748; flex:1; }
.score-label { font-size:13px; color:#718096; font-weight:bold; }
.progress-bar { height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; border-radius:4px; transition:width 0.5s ease; background:linear-gradient(90deg,#38a169,#68d391); }
.turtle-progress { font-size:18px; position:absolute; transition:left 0.5s ease; top:-14px; }

.quiz-body { flex:1; padding:20px; }
.animal-hint { display:none; }
.q-card { position:relative; border-radius:16px; overflow:hidden; margin-bottom:18px; box-shadow:0 4px 16px rgba(0,0,0,0.18); min-height:200px; }
.q-card-bg { position:absolute; inset:0; background-size:contain; background-position:center center; background-repeat:no-repeat; background-color:#1a1a1a; filter:brightness(0.55); z-index:0; }
.q-card-content { position:relative; z-index:1; padding:16px; color:white; }
.q-number-card { font-size:12px; color:rgba(255,255,255,0.85); margin-bottom:80px; }
.q-text-card { font-size:17px; line-height:1.65; font-weight:600; color:white; text-shadow:0 2px 6px rgba(0,0,0,0.8); background:rgba(0,0,0,0.35); border-radius:10px; padding:10px 12px; }
.q-number { font-size:12px; color:#718096; margin-bottom:6px; }
.q-text { font-size:17px; line-height:1.65; color:#1a202c; margin-bottom:18px; font-weight:500; background:white; padding:14px 16px; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.choices { display:flex; flex-direction:column; gap:10px; }
.choice-btn { padding:14px 16px; background:white; border:2px solid #e2e8f0; border-radius:14px; font-size:15px; text-align:left; cursor:pointer; color:#2d3748; line-height:1.5; transition:all 0.2s; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
.choice-btn:active { transform:scale(0.97); }
.choice-btn.correct { background:linear-gradient(135deg,#f0fff4,#c6f6d5); border-color:#38a169; color:#22543d; animation:pop 0.3s ease-out; }
.choice-btn.wrong   { background:linear-gradient(135deg,#fff5f5,#fed7d7); border-color:#e53e3e; color:#742a2a; animation:shake 0.4s ease-out; }
.choice-btn.show-correct { background:linear-gradient(135deg,#f0fff4,#c6f6d5); border-color:#38a169; color:#22543d; }
.choice-btn:disabled { cursor:default; }
.explanation { margin-top:14px; border-radius:14px; padding:14px; font-size:14px; line-height:1.75; animation:slideUp 0.3s ease-out; }
.explanation.correct-exp { background:#fffbeb; border:2px solid #f6e05e; color:#744210; }
.explanation.wrong-exp   { background:#fff5f5; border:2px solid #feb2b2; color:#742a2a; }
.exp-title { font-weight:bold; font-size:16px; margin-bottom:6px; }
.next-btn { display:block; width:100%; margin-top:16px; padding:16px; background:linear-gradient(135deg,#38a169,#48bb78); color:white; border:none; border-radius:14px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 14px rgba(56,161,105,0.35); }
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:bold; margin-right:6px; background:#ebf8ff; color:#2b6cb0; }

/* ===== 結果 ===== */
#result { display:none; flex-direction:column; align-items:center; padding:32px 20px 48px; min-height:100vh; background:linear-gradient(180deg,#e8f5e9,#f0fff4); }
.result-animals { font-size:48px; margin-bottom:8px; letter-spacing:4px; }
.result-title { font-size:22px; font-weight:bold; color:#1b5e20; margin-bottom:8px; }
.result-score { font-size:56px; font-weight:bold; color:#276749; margin-bottom:4px; animation:pop 0.5s ease-out; }
.result-total { font-size:15px; color:#718096; margin-bottom:12px; }
.result-msg { font-size:15px; color:#4a5568; text-align:center; margin-bottom:28px; line-height:1.7; background:white; padding:16px; border-radius:16px; width:100%; max-width:320px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.result-btn { width:100%; max-width:300px; padding:16px; margin-bottom:12px; border:none; border-radius:14px; font-size:16px; font-weight:bold; cursor:pointer; }
.retry-btn { background:linear-gradient(135deg,#38a169,#48bb78); color:white; box-shadow:0 4px 14px rgba(56,161,105,0.3); }
.home-btn2 { background:#edf2f7; color:#4a5568; }

/* ===== モーダル ===== */
#how-modal { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.55); align-items:flex-end; }
#how-modal.open { display:flex; }
.how-box { background:white; border-radius:24px 24px 0 0; padding:24px 20px 44px; width:100%; }
.how-title { font-size:18px; font-weight:bold; color:#1b5e20; margin-bottom:16px; text-align:center; }
.how-step { display:flex; gap:12px; margin-bottom:14px; align-items:flex-start; }
.how-num { background:#38a169; color:white; border-radius:50%; width:28px; height:28px; min-width:28px; font-size:14px; font-weight:bold; display:flex; align-items:center; justify-content:center; }
.how-text { font-size:14px; color:#2d3748; line-height:1.7; }
.how-text b { color:#38a169; }
.how-close { display:block; width:100%; margin-top:16px; padding:14px; background:#edf2f7; border:none; border-radius:12px; font-size:15px; font-weight:bold; cursor:pointer; color:#4a5568; }
</style>
</head>
<body>

<!-- ホーム -->
<div id="home">
  <img class="home-mascot" src="https://upload.wikimedia.org/wikipedia/commons/9/92/Radiated_tortoise_%28Astrochelys_radiata%29_Tsimanampetsotsa.jpg" alt="かめじろう" onerror="this.style.display='none'">
  <div class="home-title">小学6年生 全教科チャレンジ！</div>
  <div class="home-sub">かめじろうといっしょに勉強しよう</div>
  <div class="home-note">各教科20問・毎回ランダム出題！</div>
  <div class="grass">🌿🌱🌿🌱🌿</div>
  <div class="subject-grid">
    <button class="subject-btn kokugo"  onclick="startQuiz('kokugo')">
      <span class="s-emoji">🦉</span><span class="s-name">国　語</span><span class="s-count">20問</span>
    </button>
    <button class="subject-btn sansu"   onclick="startQuiz('sansu')">
      <span class="s-emoji">🐬</span><span class="s-name">算　数</span><span class="s-count">20問</span>
    </button>
    <button class="subject-btn rika"    onclick="startQuiz('rika')">
      <span class="s-emoji">🦎</span><span class="s-name">理　科</span><span class="s-count">20問</span>
    </button>
    <button class="subject-btn shakai"  onclick="startQuiz('shakai')">
      <span class="s-emoji">🦁</span><span class="s-name">社　会</span><span class="s-count">20問</span>
    </button>
    <button class="subject-btn eigo"    onclick="startQuiz('eigo')" style="grid-column:span 2">
      <span class="s-emoji">🦜</span><span class="s-name">英　語</span><span class="s-count">20問</span>
    </button>
  </div>
  <button class="all-btn" onclick="startQuiz('all')">🐢 全教科100問チャレンジ！</button>
  <div class="install-hint" onclick="showHowTo()">📱 ホーム画面に追加する方法</div>
</div>

<!-- クイズ -->
<div id="quiz">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <button class="back-btn" onclick="goHome()">← もどる</button>
      <span class="subject-label" id="subjectLabel"></span>
      <span class="score-label" id="scoreLabel">0問正解</span>
    </div>
    <div style="position:relative;height:8px;">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="turtle-progress" id="turtleWalk" style="left:0%">🐢</span>
    </div>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<!-- 結果 -->
<div id="result">
  <div class="result-animals" id="resultAnimals">🐢🌟🐢</div>
  <div class="result-title" id="resultTitle">チャレンジ完了！</div>
  <div class="result-score" id="resultScore">0%</div>
  <div class="result-total" id="resultTotal"></div>
  <div class="result-msg" id="resultMsg"></div>
  <button class="result-btn retry-btn" onclick="retryQuiz()">🔄 もう一度チャレンジ！</button>
  <button class="result-btn home-btn2" onclick="goHome()">🏠 教科えらびにもどる</button>
</div>

<!-- 使い方モーダル -->
<div id="how-modal" onclick="if(event.target===this)closeHowTo()">
  <div class="how-box">
    <div class="how-title">🐢 iPhoneアプリにする方法</div>
    <div class="how-step"><div class="how-num">1</div><div class="how-text"><b>Safari</b>でこのページを開く</div></div>
    <div class="how-step"><div class="how-num">2</div><div class="how-text">画面下の<b>「共有」ボタン（↑）</b>をタップ</div></div>
    <div class="how-step"><div class="how-num">3</div><div class="how-text"><b>「ホーム画面に追加」</b>を選ぶ</div></div>
    <div class="how-step"><div class="how-num">4</div><div class="how-text">右上の<b>「追加」</b>をタップ → 完成！</div></div>
    <button class="how-close" onclick="closeHowTo()">閉じる</button>
  </div>
</div>

<script>
// カメ各種（20種類）
const TURTLES = [
  'https://upload.wikimedia.org/wikipedia/commons/a/a6/Aldabra.giant.tortoise.arp.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/b/bb/Hawaii_turtle_2.JPG',
  'https://upload.wikimedia.org/wikipedia/commons/3/33/Florida_Redbelly_Turtle_%28Pseudemys_nelsoni%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/5/5c/Total_internal_reflection_of_Chelonia_mydas.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/d/dd/Rotwangen_Schmuckschildkr%C3%B6ten.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/6/68/Blandings_turtle.png',
  'https://upload.wikimedia.org/wikipedia/commons/f/fc/Group_of_red_eared_turtles.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/b/b7/Land_Turtle._%2831735898645%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/6/63/Spot_The_Turtle_%28145209867%29.jpeg',
  'https://upload.wikimedia.org/wikipedia/commons/4/48/Such_a_nice_reef_-_Flickr_-_Christian_Gloor.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/9/90/Sunbathing_%28145210643%29.jpeg',
  'https://upload.wikimedia.org/wikipedia/commons/5/52/TopsailTurtleCenterTurtle.png',
  'https://upload.wikimedia.org/wikipedia/commons/1/14/Tortuga-Diego.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/5/57/Turtle_27.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/2/2d/Turtle_by_Fool4myCanon.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/9/98/Turtle_Head_Garden_%2838947583730%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/7/7c/Turtles_on_Log-1503797605671.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/d/df/Western_Pond_Turtle_%2852729598952%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/a/ad/Evropska_Barska_Kornja%C4%8Da.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/f/f6/CITES_Landscildkr%C3%B6te.jpg',
];
// トカゲ各種（20種類）
const LIZARDS = [
  'https://upload.wikimedia.org/wikipedia/commons/5/5d/Green_iguana_2.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/4/4b/Red-headed_rock_agama_%28Agama_lionotus%29_male.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/b/b4/Sand_Lizard_2008_G2.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/e/e6/Lizardaustalian.JPG',
  'https://upload.wikimedia.org/wikipedia/commons/7/7c/L%C3%A9zard_Madagascar_01.JPG',
  'https://upload.wikimedia.org/wikipedia/commons/5/53/Backbone_Trail_Lizard.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/3/33/Blue_Head_Lizard_1.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/e/ee/Blue_Head_Lizard_2.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/f/f4/Caiman_Lizard_at_Singapore_Zoo.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/9/93/Calotes_-_Green_Garden_lizard_Male.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/c/c0/Friend_in_my_House.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/5/5c/Honduran_Anolis_sagrei.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/3/3c/Jayakars_Oman_Lizard_UA2_3823.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/f/f1/Little_lizard_%2852213184031%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/c/c4/Lizad_on_the_stone.JPG',
  'https://upload.wikimedia.org/wikipedia/commons/9/97/Lizard_%2823544056773%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/e/e1/Lizard_on_a_boulder_in_Green_Canyon.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/8/8c/Lizard_peeking_out_of_bird_box.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/0/04/Male_Brown_Anole_on_tree%2C_looking_back.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/0/00/Oriental_Garden_Lizard_photographed_at_Bardiya_National_Park.jpg',
];

// カメ・トカゲを混ぜてシャッフルしたプール（1教科で同じ画像が出ない）
let imagePool = [];
function buildImagePool(){
  const combined = [...TURTLES, ...LIZARDS];
  imagePool = shuffleArray(combined);
}

const QUESTIONS = {
  kokugo: [
    { q:"「承認」の読みがなは？", choices:["じょうにん","しょにん","しょうにん","しょうけん"], ans:2, exp:"承（うけたまわ）る＋認（みと）める＝しょうにん。認めてOKを出すこと。" },
    { q:"「批評」の読みがなは？", choices:["ひへい","ひひょう","びひょう","ひびょう"], ans:1, exp:"批（ひ）＋評（ひょう）＝ひひょう。物事の良し悪しをくわしく述べること。" },
    { q:"「簡潔」の読みがなは？", choices:["かんかつ","けんかつ","けんけつ","かんけつ"], ans:3, exp:"簡（かん）＋潔（けつ）＝かんけつ。短くすっきりまとまっていること。" },
    { q:"「食べる」の尊敬語は？", choices:["いただく","くださる","たべられる","めしあがる"], ans:3, exp:"「めしあがる」が尊敬語。「いただく」は謙譲語（自分がへりくだる言い方）。" },
    { q:"「言う」の謙譲語は？", choices:["おっしゃる","いわれる","もうす","いたす"], ans:2, exp:"「もうす（申す）」が謙譲語。「おっしゃる」は尊敬語。" },
    { q:"「いる」の尊敬語は？", choices:["おります","いらっしゃる","おられる","ございます"], ans:1, exp:"「いらっしゃる」が尊敬語。「おります」は謙譲語。" },
    { q:"「私は本を読んだ」の述語は？", choices:["私は","本を","読んだ","は"], ans:2, exp:"述語は「どうした・なんだ・どんなだ」にあたる部分。「読んだ」が述語。" },
    { q:"慣用句「手を貸す」の意味は？", choices:["借金をする","手をつなぐ","助ける・手伝う","盗む"], ans:2, exp:"「手を貸す」＝助ける・手伝うという意味の慣用句。" },
    { q:"「情けは人のためならず」の正しい意味は？", choices:["情けをかけると相手のためにならない","人に親切にすると自分にも良いことが返ってくる","情けは不要だ","親切にしすぎてはいけない"], ans:1, exp:"人に親切にすることは、めぐりめぐって自分にも良いことが返ってくるという意味。" },

    { q:"「They are playing baseball.」の意味は？", choices:["彼らは野球をしました","彼らは野球が好きです","彼らは野球するつもりです","彼らは野球をしています"], ans:3, exp:"are playing＝現在進行形（〜しているところ）。今まさに野球をしている。" },
    { q:"「buy」の過去形は？", choices:["buyed","buyd","boughted","bought"], ans:3, exp:"buyは不規則動詞。buy→bought→bought。" },
    { q:"「beautiful」の意味は？", choices:["速い","楽しい","大きい","美しい"], ans:3, exp:"beautiful＝美しい・きれいな。発音はビューティフル。" },
    { q:"「study」の三人称単数現在形は？", choices:["studys","studing","studied","studies"], ans:3, exp:"studyはyで終わる動詞。y→iに変えてesをつける。study→studies。" },
    { q:"「What is this?」の答えとして正しいのは？", choices:["He is a pen.","This is a pen.","They are a pen.","It is a pen."], ans:3, exp:"物についてWhatで聞かれたときはItで答える。It is a pen.（それはペンです）。" },
    { q:"「lunch」の意味は？", choices:["朝食","間食","夕食","昼食"], ans:3, exp:"lunch＝昼食。breakfast＝朝食、dinner/supper＝夕食。" },
    { q:"「I played soccer yesterday.」の文の時制は？", choices:["現在形","未来形","現在進行形","過去形"], ans:3, exp:"played（playの過去形）＋yesterday（昨日）で過去形の文。" },
  ],
};

const SUBJECT_NAMES = {
  kokugo:'🦉 国語', sansu:'🐬 算数', rika:'🦎 理科', shakai:'🦁 社会', eigo:'🦜 英語', all:'🐢 全教科'
};

let currentQuestions=[], currentIndex=0, score=0, selectedSubject='', currentAnimal='🐢';
const subjectUsedImages = {}; // 教科ごとに使用済み画像を管理

function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function pickRandom(arr,n){ return shuffleArray(arr).slice(0,n); }

function getNextImage(subj){
  if(!subjectUsedImages[subj] || subjectUsedImages[subj].length===0){
    subjectUsedImages[subj] = shuffleArray([...TURTLES, ...LIZARDS]);
  }
  return subjectUsedImages[subj].shift();
}

function startQuiz(subj){
  selectedSubject=subj;
  // 教科切り替え時に使用済み画像をリセット
  subjectUsedImages[subj] = shuffleArray([...TURTLES, ...LIZARDS]);
  if(subj==='all'){
    let all=[];
    for(const s of ['kokugo','sansu','rika','shakai','eigo']){
      QUESTIONS[s].forEach(q=>all.push({...q,subject:s}));
    }
    currentQuestions=shuffleArray(all);
  } else {
    currentQuestions=shuffleArray(QUESTIONS[subj]);
  }
  currentIndex=0; score=0;
  document.getElementById('home').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='flex';
  document.getElementById('subjectLabel').textContent=SUBJECT_NAMES[subj];
  renderQuestion();
}

function getAnimalForSubject(subj){
  return getNextImage(subj);
}

function renderQuestion(){
  if(currentIndex>=currentQuestions.length){ showResult(); return; }
  const q=currentQuestions[currentIndex];
  const total=currentQuestions.length;
  const pct=(currentIndex/total*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('turtleWalk').style.left=Math.min(pct,92)+'%';
  document.getElementById('scoreLabel').textContent=score+'問正解';

  const subj = q.subject || selectedSubject;
  const animal = getAnimalForSubject(subj);
  const badge = q.subject ? `<span class="badge">${SUBJECT_NAMES[q.subject]}</span>` : '';

  let html=`<div class="q-card">
    <div class="q-card-bg" style="background-image:url('${animal}')"></div>
    <div class="q-card-content">
      <div class="q-number-card">${badge}問題 ${currentIndex+1} / ${total}</div>
      <div class="q-text-card">${q.q}</div>
    </div>
  </div>`;
  html+=`<div class="choices">`;
  q.choices.forEach((c,i)=>{
    html+=`<button class="choice-btn" onclick="selectAnswer(${i})" id="choice-${i}">${c}</button>`;
  });
  html+=`</div><div id="explanation"></div>`;
  document.getElementById('quizBody').innerHTML=html;
  window.scrollTo(0,0);
}

function selectAnswer(i){
  const q=currentQuestions[currentIndex];
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const correct=i===q.ans;
  if(correct){ btns[i].classList.add('correct'); score++; }
  else{ btns[i].classList.add('wrong'); btns[q.ans].classList.add('show-correct'); }

  const expClass = correct ? 'correct-exp' : 'wrong-exp';
  const expTitle = correct ? '✅ 正解！すごい！' : '❌ 不正解…おしい！';
  const total=currentQuestions.length;
  document.getElementById('explanation').innerHTML=`
    <div class="explanation ${expClass}">
      <div class="exp-title">${expTitle}</div>
      ${q.exp}
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${currentIndex+1<total ? '次の問題へ 🐢 →' : '結果を見る 🎉'}
    </button>`;
}

function nextQuestion(){ currentIndex++; renderQuestion(); }

function showResult(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='flex';
  const total=currentQuestions.length;
  const pct=Math.round(score/total*100);
  let animals='😢🐢😢', title='チャレンジ完了！', msg='';
  if(pct>=90){ animals='🏆🐢🌟✨🎉'; msg='かめじろうも大喜び！ほぼ完璧だよ！\nこの調子でテスト本番もがんばって！'; }
  else if(pct>=70){ animals='😊🐢🌿'; msg='よくできました！\n間違えた問題を見直してさらに上を目指そう！'; }
  else if(pct>=50){ animals='😅🐢🍀'; msg='もう少しで合格ライン！\n苦手な問題を中心に復習しよう。'; }
  else { animals='💪🐢🌱'; msg='かめじろうも応援してるよ！\n一緒にもう一度チャレンジしよう！'; }
  document.getElementById('resultAnimals').textContent=animals;
  document.getElementById('resultScore').textContent=pct+'%';
  document.getElementById('resultTotal').textContent=`${score} / ${total}問 正解`;
  document.getElementById('resultMsg').textContent=msg;
}

function retryQuiz(){ startQuiz(selectedSubject); }
function goHome(){
  document.getElementById('quiz').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('home').style.display='flex';
}
function showHowTo(){ document.getElementById('how-modal').classList.add('open'); }
function closeHowTo(){ document.getElementById('how-modal').classList.remove('open'); }

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
</body>
</html>
