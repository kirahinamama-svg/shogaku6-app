<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小6クイズ">
<meta name="theme-color" content="#38a169">
<title>小学6年生クイズアプリ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #38a169;
    --green-dark: #276749;
    --green-light: #68d391;
    --bg: #f0fff4;
    --card-radius: 16px;
  }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'ヒラギノ角ゴ ProN W3', Meiryo, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: #1a202c;
    -webkit-tap-highlight-color: transparent;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; }

  /* ---- SCREENS ---- */
  .screen { display: none; padding: 16px; min-height: 100vh; }
  .screen.active { display: block; }

  /* ---- HOME SCREEN ---- */
  #home-screen {
    background: linear-gradient(160deg, #e6fffa 0%, #c6f6d5 50%, #9ae6b4 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 40px;
    padding-bottom: 40px;
  }
  #home-screen.active { display: flex; }
  .home-logo {
    width: 150px; height: 150px;
    object-fit: cover;
    object-position: 45% 60%;
    border-radius: 50%;
    border: 5px solid var(--green);
    box-shadow: 0 8px 32px rgba(56,161,105,0.35);
    margin-bottom: 18px;
  }
  .home-title {
    font-size: 1.7rem;
    font-weight: bold;
    color: var(--green-dark);
    margin-bottom: 6px;
    text-align: center;
  }
  .home-subtitle {
    font-size: 0.95rem;
    color: #2f855a;
    margin-bottom: 36px;
    text-align: center;
  }
  .subject-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 380px;
  }
  .subject-btn {
    background: white;
    border: 2.5px solid var(--green);
    border-radius: 14px;
    padding: 22px 10px;
    font-size: 1.2rem;
    font-weight: bold;
    color: var(--green-dark);
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 12px rgba(56,161,105,0.15);
    transition: transform 0.13s, box-shadow 0.13s, background 0.13s;
    -webkit-user-select: none; user-select: none;
  }
  .subject-btn:active {
    transform: scale(0.96);
    background: #c6f6d5;
    box-shadow: 0 2px 6px rgba(56,161,105,0.2);
  }
  .subject-btn .subj-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }

  /* ---- QUIZ SCREEN ---- */
  #quiz-screen { padding: 0; }
  .quiz-header {
    background: var(--green);
    color: white;
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    font-size: 1.1rem;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  .quiz-subject-name { font-size: 1.1rem; font-weight: bold; flex: 1; }
  .quiz-progress-text { font-size: 0.85rem; opacity: 0.9; }
  .progress-bar-wrap { height: 5px; background: #c6f6d5; }
  .progress-bar { height: 100%; background: var(--green-dark); transition: width 0.3s; }

  .quiz-body { padding: 16px; }

  /* ---- QUESTION CARD ---- */
  .q-card { position:relative; border-radius:16px; overflow:hidden; margin-bottom:18px; min-height:200px; }
  .q-card-bg { position:absolute; inset:0; background-size:contain; background-position:center; background-repeat:no-repeat; background-color:#1a1a1a; filter:brightness(0.55); z-index:0; }
  .q-card-content { position:relative; z-index:1; padding:16px; }
  .q-text-card { background:rgba(0,0,0,0.35); border-radius:10px; padding:10px 12px; }
  .q-num { color: #9ae6b4; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; }
  .q-text { color: white; font-size: 1.05rem; font-weight: bold; line-height: 1.5; }

  /* ---- CHOICES ---- */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: white;
    border: 2px solid #b2dfdb;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 0.98rem;
    font-weight: 600;
    color: #1a202c;
    cursor: pointer;
    text-align: left;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    -webkit-user-select: none; user-select: none;
  }
  .choice-btn:active:not(:disabled) { transform: scale(0.98); }
  .choice-btn.correct { background: #c6f6d5; border-color: var(--green); color: var(--green-dark); }
  .choice-btn.wrong { background: #fed7d7; border-color: #fc8181; color: #c53030; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn .choice-icon { margin-right: 6px; }

  /* ---- NEXT BTN ---- */
  .next-btn {
    display: none;
    width: 100%;
    margin-top: 14px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(56,161,105,0.3);
    transition: background 0.13s;
  }
  .next-btn:active { background: var(--green-dark); }

  /* ---- RESULT SCREEN ---- */
  #result-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding-top: 40px; padding-bottom: 40px;
    background: linear-gradient(160deg, #e6fffa 0%, #c6f6d5 60%, #9ae6b4 100%);
    min-height: 100vh;
  }
  #result-screen.active { display: flex; }
  .result-animal {
    width: 120px; height: 120px;
    object-fit: cover; border-radius: 50%;
    border: 4px solid var(--green);
    box-shadow: 0 6px 24px rgba(56,161,105,0.3);
    margin-bottom: 18px;
  }
  .result-title { font-size: 1.5rem; font-weight: bold; color: var(--green-dark); margin-bottom: 8px; }
  .result-score {
    font-size: 3rem; font-weight: bold; color: var(--green);
    margin-bottom: 4px; line-height: 1;
  }
  .result-score-label { font-size: 0.9rem; color: #2f855a; margin-bottom: 24px; }
  .result-message { font-size: 1.1rem; color: #276749; margin-bottom: 28px; font-weight: bold; text-align: center; }
  .result-detail { width: 100%; max-width: 380px; margin-bottom: 28px; }
  .result-item {
    background: white;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.88rem;
    border-left: 4px solid #b2dfdb;
  }
  .result-item.r-correct { border-left-color: var(--green); }
  .result-item.r-wrong { border-left-color: #fc8181; }
  .result-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .result-q { flex: 1; }
  .result-q-text { font-weight: bold; color: #1a202c; margin-bottom: 2px; }
  .result-q-ans { color: #2f855a; font-size: 0.82rem; }
  .result-q-wrong-ans { color: #c53030; font-size: 0.82rem; }
  .result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
  .retry-btn, .home-btn-r {
    padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: bold;
    cursor: pointer; border: none; transition: background 0.13s;
  }
  .retry-btn { background: var(--green); color: white; box-shadow: 0 4px 14px rgba(56,161,105,0.3); }
  .retry-btn:active { background: var(--green-dark); }
  .home-btn-r { background: white; color: var(--green-dark); border: 2px solid var(--green); }
  .home-btn-r:active { background: #c6f6d5; }

  /* answer feedback */
  .answer-feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.93rem;
    font-weight: bold;
    display: none;
  }
  .answer-feedback.correct { background: #c6f6d5; color: var(--green-dark); }
  .answer-feedback.wrong { background: #fed7d7; color: #c53030; }
</style>
</head>
<body>
<div id="app">
  <!-- HOME -->
  <div id="home-screen" class="screen active">
    <img class="home-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Astrochelys_radiata_-Plzen_zoo-8.jpg/320px-Astrochelys_radiata_-Plzen_zoo-8.jpg" alt="カメ" onerror="this.style.display='none'">

    <div class="subject-grid">
      <button class="subject-btn" onclick="startSubject('国語')">
        <span class="subj-icon">📖</span>国語
      </button>
      <button class="subject-btn" onclick="startSubject('算数')">
        <span class="subj-icon">🔢</span>算数
      </button>
      <button class="subject-btn" onclick="startSubject('理科')">
        <span class="subj-icon">🔬</span>理科
      </button>
      <button class="subject-btn" onclick="startSubject('社会')">
        <span class="subj-icon">🌏</span>社会
      </button>
      <button class="subject-btn" style="grid-column: span 2;" onclick="startSubject('英語')">
        <span class="subj-icon">🔤</span>英語
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← ホーム</button>
      <span class="quiz-subject-name" id="quiz-subject-label"></span>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>

    <div class="quiz-body">
      <div class="q-card" id="q-card">
        <div class="q-card-bg" id="q-card-bg"></div>
        <div class="q-card-content">
          <div class="q-text-card">
            <div class="q-num" id="q-num"></div>
            <div class="q-text" id="q-text"></div>
          </div>
        </div>
      </div>
      <div class="choices" id="choices"></div>
      <div class="answer-feedback" id="answer-feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-screen" class="screen">
    <img class="result-animal" id="result-animal" src="" alt="アニマル" onerror="this.style.display='none'">
    <div class="result-title" id="result-subject-name"></div>
    <div class="result-score" id="result-score"></div>
    <div class="result-score-label">/ 10問</div>
    <div class="result-message" id="result-message"></div>
    <div class="result-detail" id="result-detail"></div>
    <div class="result-btns">
      <button class="retry-btn" onclick="retrySubject()">もう一度チャレンジ！</button>
      <button class="home-btn-r" onclick="goHome()">教科えらびに戻る</button>
    </div>
  </div>
</div>

// ==============================
// STATE
// ==============================
let currentSubject = null;
let sessionQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let usedImageIndices = [];
let sessionAnswers = [];

// ==============================
// HELPERS
// ==============================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickImages(count) {
  const indices = shuffle([...Array(IMAGES.length).keys()]);
  usedImageIndices = indices.slice(0, count);
  return usedImageIndices.map(i => IMAGES[i]);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==============================
// QUIZ LOGIC
// ==============================
function startSubject(subject) {
  currentSubject = subject;
  const allQ = QUESTIONS[subject];
  // Shuffle and pick 10, then shuffle choices within each
  const picked = shuffle(allQ).slice(0, 10);
  sessionQuestions = picked.map(q => {
    // Shuffle choices, track correct answer
    const indexed = q.choices.map((c, i) => ({ text: c, correct: i === q.ans }));
    const shuffled = shuffle(indexed);
    return { q: q.q, choices: shuffled, correctText: q.choices[q.ans] };
  });
  sessionImages = pickImages(10);
  currentIndex = 0;
  score = 0;
  sessionAnswers = [];
  showScreen('quiz-screen');
  document.getElementById('quiz-subject-label').textContent = subject;
  renderQuestion();
}

let sessionImages = [];

function renderQuestion() {
  const q = sessionQuestions[currentIndex];
  answered = false;

  // Progress
  const prog = ((currentIndex) / 10) * 100;
  document.getElementById('progress-bar').style.width = prog + '%';
  document.getElementById('quiz-progress-label').textContent = `${currentIndex + 1} / 10`;
  document.getElementById('q-num').textContent = `第${currentIndex + 1}問`;
  document.getElementById('q-text').textContent = q.q;

  // Background image
  const bg = document.getElementById('q-card-bg');
  const imgUrl = sessionImages[currentIndex] || IMAGES[0];
  bg.style.backgroundImage = `url('${imgUrl}')`;

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = () => selectAnswer(i, c.correct, q.correctText);
    choicesEl.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('answer-feedback');
  fb.style.display = 'none';
  fb.className = 'answer-feedback';
  fb.textContent = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
}

function selectAnswer(idx, isCorrect, correctText) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (sessionQuestions[currentIndex].choices[i].correct) {
      btn.classList.add('correct');
      btn.innerHTML = '<span class="choice-icon">✅</span>' + btn.textContent;
    }
  });

  const fb = document.getElementById('answer-feedback');
  if (isCorrect) {
    score++;
    btns[idx].classList.add('correct');
    fb.className = 'answer-feedback correct';
    fb.textContent = '正解！すばらしい！';
  } else {
    btns[idx].classList.add('wrong');
    btns[idx].innerHTML = '<span class="choice-icon">❌</span>' + btns[idx].textContent.replace('❌','');
    fb.className = 'answer-feedback wrong';
    fb.textContent = `不正解。正解は「${correctText}」です。`;
  }
  fb.style.display = 'block';

  sessionAnswers.push({
    q: sessionQuestions[currentIndex].q,
    correct: isCorrect,
    correctText,
    userChoice: sessionQuestions[currentIndex].choices[idx].text
  });

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  if (currentIndex === 9) {
    nextBtn.textContent = '結果を見る！';
  } else {
    nextBtn.textContent = '次の問題へ →';
  }
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= 10) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('progress-bar').style.width = '100%';
  showScreen('result-screen');
  document.getElementById('result-subject-name').textContent = currentSubject + ' — 結果';
  document.getElementById('result-score').textContent = score;

  // Pick result animal image
  const rImg = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  document.getElementById('result-animal').src = rImg;

  // Message
  let msg = '';
  if (score === 10) msg = '完璧！満点です！🎉';
  else if (score >= 8) msg = 'すばらしい！よくできました！';
  else if (score >= 6) msg = 'がんばりました！もう少しで満点！';
  else if (score >= 4) msg = 'まずまずです。復習してみよう！';
  else msg = 'もっと練習しよう！きっとできる！';
  document.getElementById('result-message').textContent = msg;

  // Detail
  const detail = document.getElementById('result-detail');
  detail.innerHTML = '';
  sessionAnswers.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'result-item ' + (a.correct ? 'r-correct' : 'r-wrong');
    let html = `<span class="result-icon">${a.correct ? '✅' : '❌'}</span>
      <div class="result-q">
        <div class="result-q-text">Q${i+1}. ${a.q}</div>
        <div class="result-q-ans">正解: ${a.correctText}</div>`;
    if (!a.correct) {
      html += `<div class="result-q-wrong-ans">あなたの答え: ${a.userChoice}</div>`;
    }
    html += '</div>';
    div.innerHTML = html;
    detail.appendChild(div);
  });
}

function retrySubject() {
  startSubject(currentSubject);
}

function goHome() {
  showScreen('home-screen');
}

// ==============================
// SERVICE WORKER (PWA via blob)
// ==============================
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'shogaku6-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => caches.match('/')))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .then(() => console.log('SW registered'))
    .catch(e => console.warn('SW registration failed:', e));
}
